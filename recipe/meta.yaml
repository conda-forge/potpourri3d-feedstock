{% set name = "potpourri3d" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/potpourri3d-{{ version }}.tar.gz
  sha256: 212824954aa3a2f41dd6822017c2df8ab0e476a679a5ebb5be907e8b39558d97

build:
  number: 0
  skip: true  # [win]

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - pybind11                               # [build_platform != target_platform]
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - cmake
    - make
  host:
    - python
    - pip
    - setuptools
    - eigen
    - geometry-central
    - pybind11
  run:
    - python
    - geometry-central
    - numpy
    - scipy

test:
  imports:
    - potpourri3d
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/nmwsharp/potpourri3d
  summary: An invigorating blend of 3D geometry tools in Python.
  license: MIT
  license_file:
    - LICENSE

extra:
  recipe-maintainers:
    - ytausch
